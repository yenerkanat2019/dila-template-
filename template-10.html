<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DilaFit — Instagram First</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;background:#fafafa;color:#262626}
.back-bar{padding:15px;background:#fff;border-bottom:1px solid #dbdbdb;text-align:center}
.back-bar a{color:#00376b;text-decoration:none;font-size:14px;font-weight:600}
nav{background:#fff;padding:15px 20px;border-bottom:1px solid #dbdbdb;display:flex;justify-content:space-between;max-width:600px;margin:0 auto;position:sticky;top:0;z-index:10}
.logo{font-family:Georgia, serif;font-weight:700;font-size:20px}
.profile{max-width:600px;margin:30px auto;padding:0 20px}
.ig-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:2px;margin-top:20px}
.ig-grid div{aspect-ratio:1/1;background:#ddd}
.ig-grid .featured{background:linear-gradient(160deg, #3B6D11, #C0DD97);grid-column:span 2;grid-row:span 2;display:flex;align-items:flex-end;padding:20px;color:#fff;font-weight:700}
.bio{padding:20px 0;border-top:1px solid #dbdbdb;margin-top:20px}
.bio h2{font-size:16px;margin-bottom:5px}
.bio p{font-size:14px;color:#8e8e8e}
.btn-blue{background:#0095f6;color:#fff;display:block;text-align:center;padding:10px;border-radius:8px;text-decoration:none;font-weight:600;margin-top:15px}
</style>
</head>
<body>
<div class="back-bar"><a href="index.html">← Dila Karakurt Koleksiyonu</a></div>
<nav>
    <div class="logo">dila.karakurt</div>
</nav>
<div class="profile">
    <div class="ig-grid">
        <div class="featured">EMS ile Zayıfla<br><small>Meta Slim B-8317</small></div>
        <div style="background: #fde8d8"></div>
        <div style="background: #e2b8f0"></div>
    </div>
    <div class="bio">
        <h2>Diyetisyen Dila Karakurt</h2>
        <p>👩‍⚕️ Beslenme Danışmanı & EMS Uzmanı<br>📍 Klinik Ortamında Ölçümlü Zayıflama<br>✨ GS Makine Teknolojisi</p>
        <a href="#" class="btn-blue">Randevu İçin Tıklayın</a>
    </div>
</div>
</body>
</html>
