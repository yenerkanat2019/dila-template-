<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DilaFit — Story Driven</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--dark-purple:#1c0a2e;--bright-purple:#c878e0;--orange:#E8843A}
body{font-family:'Space Grotesk',sans-serif;background:var(--dark-purple);color:#fff}
.back-bar{padding:20px 32px;background:rgba(0,0,0,0.2)}
.back-bar a{color:var(--bright-purple);text-decoration:none;font-weight:700}
nav{padding:30px 32px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:24px;font-weight:700;background:linear-gradient(90deg, var(--orange), var(--bright-purple));-webkit-background-clip: text;-webkit-text-fill-color: transparent;}
.rainbow-strip{height:4px;background:linear-gradient(90deg, #3B6D11, #E8843A, #7C4D8B)}
.hero{padding:100px 32px;text-align:center;max-width:900px;margin:0 auto}
.tag{display:inline-block;border:1px solid var(--bright-purple);color:var(--bright-purple);padding:8px 20px;border-radius:100px;font-size:14px;margin-bottom:30px}
.hero h1{font-size:62px;line-height:1.1;margin-bottom:20px}
.hero p{font-size:18px;color:#aaa;margin-bottom:40px}
.btn-grad{background:linear-gradient(135deg, var(--orange), var(--bright-purple));color:#fff;padding:18px 40px;border-radius:100px;text-decoration:none;font-weight:700;display:inline-block}
</style>
</head>
<body>
<div class="back-bar"><a href="index.html">← Geri Dön</a></div>
<div class="rainbow-strip"></div>
<nav>
    <div class="logo">DilaForm</div>
</nav>
<section class="hero">
    <div class="tag">Başarı Hikayeleri</div>
    <h1>Gerçek İnsanlar,<br>Gerçek Sonuçlar</h1>
    <p>500'den fazla danışmanımızın Meta Slim (GS Makine) ve özel diyet programlarıyla yazdığı değişim hikayesine sen de katıl.</p>
    <a href="#" class="btn-grad">Hikayeleri Oku</a>
</section>
</body>
</html>
