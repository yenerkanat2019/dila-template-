<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DilaFit — Modern Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#3B6D11;--orange:#E8843A}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;padding:40px 32px}
.back-bar{margin-bottom:60px;font-size:14px}
.back-bar a{color:#aaa;text-decoration:none;text-transform:uppercase;letter-spacing:2px}
nav{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:100px}
.logo{font-family:'Syncopate',sans-serif;font-size:18px;letter-spacing:5px}
.menu{display:flex;gap:30px}
.menu a{text-decoration:none;color:#aaa;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.hero h1{font-size:90px;font-weight:800;line-height:0.9;letter-spacing:-3px;margin-bottom:40px}
.accent{color:var(--green)}
.line{width:80px;height:4px;background:var(--orange);margin-bottom:40px}
.hero p{font-size:20px;color:#555;max-width:500px;line-height:1.6}
.btns{display:flex;gap:20px;margin-top:50px}
.btn-black{background:#111;color:#fff;padding:18px 40px;text-decoration:none;font-weight:800;font-size:14px}
.btn-outline{border:2px solid var(--green);color:var(--green);padding:18px 40px;text-decoration:none;font-weight:800;font-size:14px}
</style>
</head>
<body>
<div class="back-bar"><a href="index.html">← Koleksiyon</a></div>
<nav>
    <div class="logo">DILAFIT</div>
    <div class="menu"><a href="#">EMS</a><a href="#">Paket</a><a href="#">SSS</a></div>
</nav>
<section class="hero">
    <h1>Formda <span class="accent">kal</span>,<br>güçlü <span class="accent">yaşa</span></h1>
    <div class="line"></div>
    <p>Meta Slim teknolojisi, kişiselleştirilmiş beslenme danışmanlığı ve yüksek motivasyon tek bir çatı altında.</p>
    <div class="btns">
        <a href="#" class="btn-black">BAŞLAYALIM</a>
        <a href="#" class="btn-outline">PAKETLER</a>
    </div>
</section>
</body>
</html>
